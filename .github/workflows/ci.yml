name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: travel_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d travel_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/travel_ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: github-actions-nextauth-secret
      RAZORPAY_KEY_ID: rzp_test_ci_key
      RAZORPAY_KEY_SECRET: ci_secret_key
      NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_ci_key
      CLOUDINARY_CLOUD_NAME: ci-cloud
      CLOUDINARY_API_KEY: ci-key
      CLOUDINARY_API_SECRET: ci-secret
      EMAIL_HOST: smtp.example.com
      EMAIL_PORT: 587
      EMAIL_USER: deepankumar81c401a1e8@gmail.com
      EMAIL_PASS: ci-email-password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push Prisma schema
        run: npx prisma db push

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
